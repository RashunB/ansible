- name: Setup Service - "{{ media_app_exec_name }}"
  block:
    - name: Service File - "{{ media_app_exec_name }}"
      ansible.builtin.template:
        backup: true
        src: "app_service.j2"
        dest: "{{ media_app_service_file }}"
        owner: root
        group: root
        mode: "0644"
      register: media_app_service
      notify: Restart App - "{{ media_app_exec_name }}"

- name: Start App - "{{ media_app_exec_name }}"
  ansible.builtin.systemd_service:
    name: "{{ media_app_service_name }}"
    state: started
    enabled: true
