- name: Restart App - "{{ media_app_exec_name }}"
  ansible.builtin.systemd_service:
    name: "{{ media_app_service_name }}"
    state: restarted
    daemon_reload: true
    enabled: true

- name: Stop App - "{{ media_app_exec_name }}"
  ansible.builtin.systemd_service:
    name: "{{ media_app_service_name }}"
    state: stopped
    enabled: true
